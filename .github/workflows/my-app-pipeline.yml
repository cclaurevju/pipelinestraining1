name: CI

on:
  push:
    branches: ["carlosClaure_p1_main", "main"]
  pull_request:
    branches: ["carlosClaure_p1_main", "main"]

  workflow_dispatch:

jobs:
  check-code:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

  build:
    runs-on: self-hosted
    steps:
      - name: Building project
        run: dotnet build
